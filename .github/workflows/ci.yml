name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.0
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Build (ReleaseSmall)
        run: zig build -Doptimize=ReleaseSmall
